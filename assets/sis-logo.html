<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SiS — Hero Lockup</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Display&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:transparent; min-height:100vh; display:flex; align-items:center; justify-content:center; }
.katex, .katex * { color:inherit !important; }
</style>
</head>
<body>

<div style="
 position:relative;
 display:inline-flex;
 flex-direction:column;
 align-items:center;
 gap:0;
 padding:60px 72px 36px;
 background:transparent;
 border:none;">

 <!-- MARK: S (#7a9ab8), 𝑖 blue -->
 <div id="mark" style="position:relative;display:inline-flex;align-items:baseline;line-height:1;z-index:2;">
  <span style="font-family:'Libre Caslon Display','Palatino Linotype',Palatino,serif;font-weight:400;font-size:160px;line-height:1;color:#7a9ab8;position:relative;z-index:3;">S</span>
  <span id="mi" style="display:inline;vertical-align:baseline;line-height:1;margin:0 -0.04em;color:#2d6db5;font-size:70px;position:relative;z-index:3;"></span>
  <span style="font-family:'Libre Caslon Display','Palatino Linotype',Palatino,serif;font-weight:400;font-size:160px;line-height:1;color:#7a9ab8;position:relative;z-index:3;">S</span>
 </div>

 <!-- Tagline -->
 <div style="
  font-family:'Libre Caslon Display','Palatino Linotype',Palatino,serif;
  font-size:23px;
  letter-spacing:.01em;
  color:#7a9ab8;
  margin-top:-18px;
 ">Interpretable Simplicity</div>

</div>

<script>
katex.render('i', document.getElementById('mi'), {displayMode:false, throwOnError:false});
document.getElementById('mi').querySelectorAll('span').forEach(s => s.style.color = '#2d6db5');
</script>
</body>
</html>
