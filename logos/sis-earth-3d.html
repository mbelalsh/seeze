<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>S𝑖S — Realistic Earth</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300&family=Libre+Caslon+Display&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#04060c; min-height:100vh; display:flex; align-items:center; justify-content:center; }
.katex, .katex * { color:inherit !important; }
@keyframes twinkle { 0%,100%{opacity:.06} 50%{opacity:.85} }
</style>
</head>
<body>
<div id="scene" style="position:relative;display:flex;flex-direction:column;align-items:center;gap:8px;padding:80px 80px 52px;background:#030610;border:1px solid #0a1220;min-width:620px">
  <svg style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0" preserveAspectRatio="xMidYMid slice">
    <circle cx="42"  cy="22"  r=".85" fill="white" style="animation:twinkle 3.2s infinite"/>
    <circle cx="200" cy="14"  r=".55" fill="white" style="animation:twinkle 4.4s .3s infinite"/>
    <circle cx="360" cy="9"   r=".65" fill="white" style="animation:twinkle 3.0s .6s infinite"/>
    <circle cx="500" cy="18"  r=".75" fill="white" style="animation:twinkle 3.7s .8s infinite"/>
    <circle cx="580" cy="30"  r=".55" fill="#7ab3f5" style="animation:twinkle 5.1s .1s infinite"/>
    <circle cx="615" cy="16"  r="1.9" fill="white" opacity=".88" style="animation:twinkle 2.6s infinite"/>
    <circle cx="30"  cy="180" r=".45" fill="white" style="animation:twinkle 4.8s .5s infinite"/>
    <circle cx="615" cy="155" r=".55" fill="white" style="animation:twinkle 3.9s .3s infinite"/>
    <circle cx="72"  cy="295" r=".50" fill="white" style="animation:twinkle 4.0s .9s infinite"/>
    <circle cx="155" cy="11"  r=".45" fill="#38bdf8" style="animation:twinkle 5.5s .2s infinite"/>
  </svg>

  <div id="mark" style="position:relative;display:inline-flex;align-items:baseline;z-index:1">
    <canvas id="ec" style="position:absolute;left:50%;top:57%;transform:translate(-50%,-50%);z-index:1;border-radius:50%;pointer-events:none"></canvas>
    <svg id="os" style="position:absolute;left:50%;top:57%;transform:translate(-50%,-50%);z-index:2;pointer-events:none;overflow:visible"></svg>
    <div style="display:inline-flex;align-items:baseline;line-height:1;position:relative;z-index:3">
      <span style="font-family:'Libre Caslon Display',Georgia,serif;font-size:130px;line-height:1;color:#4f8ff2">S</span>
      <span id="mi" style="display:inline;vertical-align:baseline;line-height:1;margin:0 -0.04em;color:#eef2ff;font-size:80px;z-index:4;position:relative"></span>
      <span style="font-family:'Libre Caslon Display',Georgia,serif;font-size:130px;line-height:1;color:#4f8ff2">S</span>
    </div>
  </div>

  <div style="width:195px;height:1px;background:linear-gradient(90deg,transparent,rgba(79,143,242,.4),transparent);z-index:1;position:relative;margin-top:4px"></div>
  <div style="font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;font-size:14px;letter-spacing:.19em;color:#3a6090;z-index:1;position:relative">Safe · Interpretable · Simple</div>
  <div style="font-family:'DM Mono',monospace;font-size:7px;letter-spacing:.3em;color:#1e3050;text-transform:uppercase;z-index:1;position:relative">Space · Aviation · Uncertainty-Aware Systems</div>
</div>

<script>
katex.render('i', document.getElementById('mi'), {displayMode:false,throwOnError:false});
document.getElementById('mi').querySelectorAll('span').forEach(s=>s.style.color='inherit');

// ── Noise ──────────────────────────────────────────────────────────
function seededRng(seed){let s=seed>>>0;return()=>{s=Math.imul(s,1664525)+1013904223>>>0;return s/4294967296}}
function makeNoise(sz,seed){
  const rng=seededRng(seed),g=new Float32Array(sz*sz);
  for(let i=0;i<g.length;i++)g[i]=rng();
  for(let p=0;p<3;p++){const t=new Float32Array(g);for(let y=1;y<sz-1;y++)for(let x=1;x<sz-1;x++)g[y*sz+x]=(t[(y-1)*sz+x]+t[(y+1)*sz+x]+t[y*sz+x-1]+t[y*sz+x+1]+t[y*sz+x]*4)/8;}
  return g;
}
function sN(n,NS,fx,fy){
  const x=((fx%1+1)%1)*(NS-1),y=((fy%1+1)%1)*(NS-1),xi=x|0,yi=y|0,xf=x-xi,yf=y-yi,x1=(xi+1)%NS,y1=(yi+1)%NS;
  return n[yi*NS+xi]*(1-xf)*(1-yf)+n[yi*NS+x1]*xf*(1-yf)+n[y1*NS+xi]*(1-xf)*yf+n[y1*NS+x1]*xf*yf;
}

// ── Earth texture ──────────────────────────────────────────────────
function makeEarthTex(W){
  const H=W/2,c=document.createElement('canvas');c.width=W;c.height=H;
  const ctx=c.getContext('2d'),img=ctx.createImageData(W,H),d=img.data;
  const NS=256,n1=makeNoise(NS,42),n2=makeNoise(NS,137),n3=makeNoise(NS,999);
  function land(lon,lat){
    const lo=lon*360-180,la=lat;
    if(la<-68||la>87)return 2;
    if(lo>-60&&lo<-15&&la>60&&la<85)return 2;
    if(lo>-170&&lo<-50&&la>15&&la<75){const dx=(lo+110)/120,dy=(la-45)/60;if(dx*dx+dy*dy*.6<.72)return 1;}
    if(lo>-95&&lo<-75&&la>5&&la<22)return 1;
    if(lo>-82&&lo<-32&&la>-56&&la<12){const dx=(lo+57)/50,dy=(la+22)/68;if(dx*dx+dy*dy*.7<.66)return 1;}
    if(lo>-12&&lo<40&&la>35&&la<72){const dx=(lo-14)/52,dy=(la-53)/37;if(dx*dx+dy*dy<.82)return 1;}
    if(lo>-20&&lo<52&&la>-36&&la<38){const dx=(lo-16)/72,dy=la/74;if(dx*dx+dy*dy*.6<.56)return 1;}
    if(lo>30&&lo<180&&la>50&&la<78)return 1;
    if(lo>40&&lo<145&&la>20&&la<55){const dx=(lo-92)/105,dy=(la-37)/35;if(dx*dx+dy*dy*.5<.72)return 1;}
    if(lo>68&&lo<90&&la>8&&la<32)return 1;
    if(lo>95&&lo<145&&la>-8&&la<25){const dx=(lo-120)/50,dy=(la-8)/33;if(dx*dx+dy*dy<.72)return 1;}
    if(lo>113&&lo<154&&la>-44&&la<-10){const dx=(lo-133)/41,dy=(la+27)/34;if(dx*dx+dy*dy<.76)return 1;}
    return 0;
  }
  function landColor(lon,lat,a,b){
    const lo=lon*360-180,la=lat,ab=Math.abs(la);
    if(ab>55)return[130+a*35,148+a*28,100+b*22];
    if(ab<28&&lo>-18&&lo<65)return[205+a*28,178+a*18,110+b*14];
    if(ab<28&&lo>113&&lo<148&&la<-20)return[188+a*22,138+a*14,72+b*10];
    if(ab<22)return[28+b*16,105+a*28,35+b*14];
    return[55+a*38,118+a*32,44+b*18];
  }
  for(let py=0;py<H;py++){
    const lat=90-py/H*180;
    for(let px=0;px<W;px++){
      const lon=px/W,v1=sN(n1,NS,lon*4,py/H*2),v2=sN(n2,NS,lon*6,py/H*3),v3=sN(n3,NS,lon*3,py/H*4);
      const lm=land(lon,lat);let r,g,b;
      if(lm===2){r=218+v1*28;g=232+v2*14;b=248+v3*7;}
      else if(lm===1){const lc=landColor(lon,lat,v1,v2);r=lc[0]+(v3-.5)*18;g=lc[1]+(v1-.5)*16;b=lc[2]+(v2-.5)*10;}
      else{r=10+v2*12;g=52+v1*18+(v3*.2)*28;b=135+v2*28+(v3*.2)*45;const sh=Math.max(0,v1-.6)*55;r+=sh*.5;g+=sh*.7;b+=sh;}
      const i=(py*W+px)*4;d[i]=Math.max(0,Math.min(255,r|0));d[i+1]=Math.max(0,Math.min(255,g|0));d[i+2]=Math.max(0,Math.min(255,b|0));d[i+3]=255;
    }
  }
  ctx.putImageData(img,0,0);return c;
}

// ── Cloud texture ──────────────────────────────────────────────────
function makeCloudTex(W){
  const H=W/2,c=document.createElement('canvas');c.width=W;c.height=H;
  const ctx=c.getContext('2d'),img=ctx.createImageData(W,H),d=img.data;
  const NS=256,nc1=makeNoise(NS,7),nc2=makeNoise(NS,31),nc3=makeNoise(NS,113);
  for(let py=0;py<H;py++){
    const ab=Math.abs(90-py/H*180);
    for(let px=0;px<W;px++){
      const lon=px/W,v=sN(nc1,NS,lon*3,py/H*2)*.5+sN(nc2,NS,lon*6,py/H*4)*.3+sN(nc3,NS,lon*11,py/H*7)*.2;
      let thr=.63;if(ab<10)thr=.52;else if(ab>45&&ab<65)thr=.56;else if(ab>75)thr=.48;
      const al=v>thr?Math.min(1,(v-thr)*5):0;
      const i=(py*W+px)*4;d[i]=d[i+1]=d[i+2]=255;d[i+3]=Math.round(al*210);
    }
  }
  ctx.putImageData(img,0,0);return c;
}

// ── Build ──────────────────────────────────────────────────────────
function buildEarth(diam){
  const canvas=document.getElementById('ec');
  canvas.width=diam*(devicePixelRatio||1);canvas.height=diam*(devicePixelRatio||1);
  canvas.style.width=diam+'px';canvas.style.height=diam+'px';
  const oR=diam*.58,dim=(oR+16)*2,os=document.getElementById('os');
  os.setAttribute('width',dim);os.setAttribute('height',dim);os.setAttribute('viewBox',`${-dim/2} ${-dim/2} ${dim} ${dim}`);
  const sx=(oR*.707).toFixed(1),sy=(-oR*.707).toFixed(1);
  os.innerHTML=`<circle r="${oR.toFixed(1)}" fill="none" stroke="#4f8ff2" stroke-width="1.3" stroke-dasharray="6 3.2" opacity=".55"/><circle cx="${sx}" cy="${sy}" r="5.2" fill="#4f8ff2" opacity=".95"/><circle cx="${sx}" cy="${sy}" r="10" fill="none" stroke="#4f8ff2" stroke-width=".8" opacity=".25"/>`;

  const renderer=new THREE.WebGLRenderer({canvas,alpha:true,antialias:true});
  renderer.setSize(diam,diam);renderer.setPixelRatio(devicePixelRatio||1);
  renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.1;
  const scene=new THREE.Scene(),cam=new THREE.PerspectiveCamera(42,1,.1,100);cam.position.z=2.55;
  const eTex=new THREE.CanvasTexture(makeEarthTex(1024)),cTex=new THREE.CanvasTexture(makeCloudTex(512));
  const earth=new THREE.Mesh(new THREE.SphereGeometry(1,64,64),new THREE.MeshPhongMaterial({map:eTex,specularMap:eTex,specular:new THREE.Color(.07,.14,.28),shininess:32,bumpMap:eTex,bumpScale:.012}));
  earth.rotation.z=.41;scene.add(earth);
  const clouds=new THREE.Mesh(new THREE.SphereGeometry(1.015,64,64),new THREE.MeshPhongMaterial({map:cTex,transparent:true,opacity:.88,depthWrite:false}));
  clouds.rotation.z=.41;scene.add(clouds);
  scene.add(new THREE.Mesh(new THREE.SphereGeometry(1.08,32,32),new THREE.MeshPhongMaterial({color:'#2255bb',transparent:true,opacity:.08,side:THREE.BackSide,depthWrite:false})));
  const sun=new THREE.DirectionalLight(0xfff8f0,1.6);sun.position.set(-1.6,1.0,2.2);scene.add(sun);
  scene.add(new THREE.AmbientLight(0x101828,.45));
  const rim=new THREE.DirectionalLight(0x2244bb,.3);rim.position.set(1.5,-.5,-1.5);scene.add(rim);
  if(window._ea)cancelAnimationFrame(window._ea);
  (function loop(){window._ea=requestAnimationFrame(loop);earth.rotation.y+=.0022;clouds.rotation.y+=.0028;renderer.render(scene,cam);})();
}

document.fonts.ready.then(()=>{
  const sis=document.querySelector('[style*="130px"]')?.closest('[style*="inline-flex"]');
  const h=sis?sis.getBoundingClientRect().height:120;
  buildEarth(Math.min(128,Math.max(82,Math.round(h*.9))));
});
</script>
</body>
</html>
