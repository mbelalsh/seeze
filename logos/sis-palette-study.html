<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SiS Colour Study</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Display&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#07090f; font-family:system-ui,sans-serif; padding:36px 28px; }
.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }
.card { border-radius:6px; padding:30px 20px 18px; display:flex; flex-direction:column; align-items:center; position:relative; overflow:hidden; }
.lbl { margin-top:14px; font-size:9px; letter-spacing:.14em; opacity:.45; color:white; text-transform:uppercase; }
.katex,.katex * { color:inherit !important; }
h2 { color:#2a4060; font-size:9px; letter-spacing:.22em; text-transform:uppercase; margin-bottom:20px; }
</style>
</head>
<body>

<h2>SiS — Colour Palette Study</h2>
<div class="grid" id="g"></div>

<script>
const P = [
  { id:'a', name:'Current',          bg:'#111d2e', S:'#dce8f8', i:'#4f8ff2', t:'#7a9ec0', b:'#1e3050' },
  { id:'b', name:'Navy + Gold',      bg:'#0d1b2a', S:'#eddcaa', i:'#c8a84b', t:'#9a8858', b:'#1a2838' },
  { id:'c', name:'Midnight + Teal',  bg:'#081820', S:'#c0e8e0', i:'#28b8a0', t:'#3a9888', b:'#0e2830' },
  { id:'d', name:'Dark + Pure White',bg:'#0c1220', S:'#ffffff',  i:'#4f8ff2', t:'#6688aa', b:'#182030' },
  { id:'e', name:'Slate + Violet',   bg:'#0f0f18', S:'#d8d0f0', i:'#9070e0', t:'#7868b8', b:'#181828' },
  { id:'f', name:'Black + Amber',    bg:'#0e1218', S:'#f0dfa8', i:'#e09828', t:'#a07838', b:'#181e24' },
  { id:'g', name:'Dark + Ice Blue',  bg:'#080c14', S:'#b8d8f8', i:'#58a8e8', t:'#4888b8', b:'#101820' },
  { id:'h', name:'Warm Dark + Rose', bg:'#120e10', S:'#f0d0d0', i:'#d85878', t:'#986070', b:'#1e1418' },
  { id:'i', name:'Forest Dark',      bg:'#080f0a', S:'#c8e8c8', i:'#48c068', t:'#389858', b:'#101808' },
];

function bgSVG(c) {
  return `<svg style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;"
    viewBox="300 40 440 300" preserveAspectRatio="xMidYMid slice">
    <defs><clipPath id="cp${c}"><rect x="410" y="40" width="220" height="300"/></clipPath></defs>
    <g clip-path="url(#cp${c})" opacity=".8">
      <path d="M -20,310 Q 520,60 1060,200" stroke="${c}" stroke-width="1.6" fill="none"/>
      <path d="M 860,10 Q 520,185 160,320" stroke="${c}" stroke-width="1.1" fill="none" stroke-dasharray="5 3" opacity=".6"/>
      <ellipse cx="520" cy="190" rx="110" ry="17" stroke="${c}" stroke-width="1.4" stroke-dasharray="5 3.5" fill="none"/>
    </g>
  </svg>`;
}

const g = document.getElementById('g');

P.forEach(p => {
  const card = document.createElement('div');
  card.className = 'card';
  card.style.background = p.bg;
  card.style.border = '1px solid ' + p.b;
  card.innerHTML = bgSVG(p.i) + `
    <div style="position:relative;display:inline-flex;align-items:baseline;line-height:1;z-index:2;">
      <span style="font-family:'Libre Caslon Display',Palatino,serif;font-size:72px;line-height:1;color:${p.S};">S</span>
      <span id="mi_${p.id}" style="display:inline;vertical-align:baseline;line-height:1;margin:0 -0.04em;color:${p.i};font-size:31px;"></span>
      <span style="font-family:'Libre Caslon Display',Palatino,serif;font-size:72px;line-height:1;color:${p.S};">S</span>
    </div>
    <div style="font-family:'Libre Caslon Display',Palatino,serif;font-size:8px;letter-spacing:.01em;color:${p.t};position:relative;z-index:2;margin-top:-3px;">Safe | Interpretable | Simple</div>
    <div class="lbl">${p.name}</div>
  `;
  g.appendChild(card);
});

setTimeout(() => {
  P.forEach(p => {
    const el = document.getElementById('mi_' + p.id);
    if (el) {
      katex.render('i', el, { displayMode: false, throwOnError: false });
      el.querySelectorAll('span').forEach(s => s.style.color = p.i);
    }
  });
}, 400);
</script>
</body>
</html>
